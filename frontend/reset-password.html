<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Campus Connect</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div style="font-size: 3rem; color: var(--primary-color);">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Reset Password</h1>
            </div>
            
            <div id="globalMessage" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.875rem;"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">
                    Update Password
                </button>
                <div style="text-align: center; margin-top: 16px; font-size: 0.875rem;">
                    <a href="index.html">Back to Login</a>
                </div>
            </form>
            
            <div style="text-align: center; margin-top: 24px;">
                <button id="themeToggleBtn" class="btn btn-icon" style="position: absolute; top: 20px; right: 20px;">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const resetForm = document.getElementById('resetForm');
            const globalMessage = document.getElementById('globalMessage');

            if (!token) {
                showMessage('No reset token provided in URL.', 'error');
                resetForm.style.display = 'none';
            }

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const submitBtn = resetForm.querySelector('button[type="submit"]');

                if (newPassword !== confirmPassword) {
                    showMessage('Passwords do not match.', 'error');
                    return;
                }

                try {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
                    
                    await fetchAPI('/auth/reset-password', {
                        method: 'POST',
                        body: JSON.stringify({ token, new_password: newPassword })
                    });
                    
                    showMessage('Password updated successfully. You can now login.', 'success');
                    resetForm.reset();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } catch (error) {
                    showMessage(error.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Update Password';
                }
            });

            function showMessage(msg, type) {
                globalMessage.textContent = msg;
                globalMessage.style.display = 'block';
                if (type === 'error') {
                    globalMessage.style.background = 'rgba(239, 68, 68, 0.1)';
                    globalMessage.style.color = 'var(--danger-color)';
                } else {
                    globalMessage.style.background = 'rgba(16, 185, 129, 0.1)';
                    globalMessage.style.color = 'var(--success-color)';
                }
            }
        });
    </script>
    <script src="js/sidebar.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
