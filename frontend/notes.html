<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Management - Campus Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .filter-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: flex-end;
            background: var(--bg-color);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .filter-item {
            flex: 1;
            min-width: 150px;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            width: 100%;
            max-width: 500px;
            background: var(--bg-color);
            border-radius: 12px;
            padding: 24px;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: none;
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .action-btns button {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-edit { background: var(--warning-color); }
        .btn-delete { background: var(--danger-color); }
        .btn-view { background: var(--info-color); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap logo-icon"></i>
                    <span>CampusConnect</span>
                </div>
            </div>
            <nav class="nav-menu">
                <div class="nav-item" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item admin-only" onclick="window.location.href='students.html'">
                    <i class="fas fa-user-graduate"></i>
                    <span>Students</span>
                </div>
                <div class="nav-item admin-only" onclick="window.location.href='attendance.html'">
                    <i class="fas fa-calendar-check"></i>
                    <span>Attendance</span>
                </div>
                <div class="nav-item admin-only" onclick="window.location.href='marks.html'">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Marks</span>
                </div>
                <div class="nav-item admin-only" onclick="window.location.href='fees.html'">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Fees</span>
                </div>
                <div class="nav-item active admin-only">
                    <i class="fas fa-book"></i>
                    <span>Notes</span>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="nav-actions">
                    <button class="btn-icon" id="menuToggle" style="display: none;"><i class="fas fa-bars"></i></button>
                    <h2 style="font-size: 1.25rem;">Notes Repository</h2>
                </div>
                <div class="nav-actions">
                    <button id="themeToggleBtn" class="btn-icon"><i class="fas fa-moon"></i></button>
                    <button id="logoutBtn" class="btn-icon" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h3 style="margin: 0;">Digital Library</h3>
                        <button class="btn btn-primary" id="openUploadModalBtn">
                            <i class="fas fa-upload"></i> Upload Notes
                        </button>
                    </div>

                    <div class="filter-bar">
                        <div class="filter-item">
                            <label class="form-label">Search Title/Keyword</label>
                            <input type="text" id="searchKeyword" class="form-control" placeholder="e.g. Data Structures">
                        </div>
                        <div class="filter-item">
                            <label class="form-label">Branch</label>
                            <select id="searchBranch" class="form-control">
                                <option value="">All Branches</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Civil">Civil</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label class="form-label">Semester</label>
                            <select id="searchSemester" class="form-control">
                                <option value="">All Semesters</option>
                                <option value="1st">1st Semester</option>
                                <option value="2nd">2nd Semester</option>
                                <option value="3rd">3rd Semester</option>
                                <option value="4th">4th Semester</option>
                                <option value="5th">5th Semester</option>
                                <option value="6th">6th Semester</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="searchBtn" style="height: 42px;">
                            Search
                        </button>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Subject</th>
                                    <th>Branch</th>
                                    <th>Semester</th>
                                    <th>Date Uploaded</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="notesTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Upload/Edit Note Modal -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeNoteModal()"><i class="fas fa-times"></i></button>
            <h3 id="noteModalTitle" style="margin-bottom: 24px;">Upload Notes</h3>
            
            <form id="noteForm">
                <input type="hidden" id="noteId">
                
                <div class="form-group">
                    <label class="form-label">Title / Description</label>
                    <input type="text" id="noteTitle" class="form-control" placeholder="e.g. Chapter 1: Introduction" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Subject</label>
                    <input type="text" id="noteSubject" class="form-control" placeholder="e.g. Data Structures" required>
                </div>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Branch</label>
                        <select id="noteBranch" class="form-control" required>
                            <option value="">Select Branch</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Civil">Civil</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Semester</label>
                        <select id="noteSemester" class="form-control" required>
                            <option value="">Select Semester</option>
                            <option value="1st">1st Semester</option>
                            <option value="2nd">2nd Semester</option>
                            <option value="3rd">3rd Semester</option>
                            <option value="4th">4th Semester</option>
                            <option value="5th">5th Semester</option>
                            <option value="6th">6th Semester</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" id="fileUploadGroup">
                    <label class="form-label">PDF File</label>
                    <input type="file" id="noteFile" class="form-control" accept="application/pdf">
                    <small style="color: var(--text-secondary); display: block; margin-top: 4px;">Max size: 10MB. Only PDF files.</small>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;" id="submitBtn">Upload</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notes.js"></script>
</body>
</html>
