<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Authentication - Campus Connect</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .form-panel {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .form-panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card" style="border-top: 4px solid var(--danger-color);">
            <div class="auth-header">
                <div style="font-size: 3rem; color: var(--danger-color);">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1>Admin Portal</h1>
                <p style="color: var(--text-secondary); margin-top: 8px;">Restricted Access</p>
            </div>
            
            <div id="globalMessage" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.875rem;"></div>

            <div id="loginPanel" class="form-panel active">
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label class="form-label" for="loginEmail">Admin Email</label>
                        <input type="email" id="loginEmail" class="form-control" placeholder="admin@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px; background: var(--danger-color);">
                        Secure Login
                    </button>
                    <div style="text-align: center; margin-top: 16px;">
                        <a href="index.html" style="font-size: 0.875rem; color: var(--text-secondary);">Return to Public Portal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/theme.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('adminLoginForm');
            
            function showGlobalMessage(msg, type) {
                const globalMessage = document.getElementById('globalMessage');
                if (!globalMessage) return;
                
                globalMessage.textContent = msg;
                globalMessage.style.display = 'block';
                if (type === 'error') {
                    globalMessage.style.background = 'rgba(239, 68, 68, 0.1)';
                    globalMessage.style.color = 'var(--danger-color)';
                } else {
                    globalMessage.style.background = 'rgba(16, 185, 129, 0.1)';
                    globalMessage.style.color = 'var(--success-color)';
                }
            }

            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('loginEmail').value;
                    const password = document.getElementById('loginPassword').value;
                    const submitBtn = loginForm.querySelector('button[type="submit"]');

                    try {
                        submitBtn.disabled = true;
                        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
                        document.getElementById('globalMessage').style.display = 'none';

                        const data = await authAPI.login(email, password, 'admin');
                        localStorage.setItem('token', data.access_token);
                        localStorage.setItem('role', 'admin');
                        window.location.href = 'admin/dashboard/index.html';
                    } catch (error) {
                        showGlobalMessage(error.message, 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = 'Secure Login';
                    }
                });
            }
        });
    </script>
</body>
</html>
