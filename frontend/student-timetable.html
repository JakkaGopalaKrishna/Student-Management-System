<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Timetable - Campus Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: var(--bg-hover);
        }

        .tab-btn.active {
            color: var(--primary-color);
            background: rgba(59, 130, 246, 0.1);
        }

        .tab-pane {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Daily/Exam Timeline Cards */
        .schedule-card {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--primary-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .exam-card {
            border-left: 4px solid var(--danger-color);
        }

        .time-block {
            min-width: 120px;
            text-align: right;
            padding-right: 16px;
            border-right: 2px solid var(--border-color);
        }

        .time-start {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .time-end {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .subject-block {
            flex-grow: 1;
        }
        
        .subject-name {
            margin: 0 0 4px 0;
            font-size: 1.125rem;
            color: var(--text-primary);
        }

        .subject-meta {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            gap: 16px;
        }

        /* Weekly Grid */
        .weekly-grid {
            display: grid;
            grid-template-columns: 100px repeat(6, 1fr);
            gap: 2px;
            background: var(--border-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            overflow-x: auto;
        }

        .grid-header {
            background: var(--bg-hover);
            padding: 12px;
            text-align: center;
            font-weight: 600;
            color: var(--text-primary);
        }

        .grid-cell {
            background: var(--bg-color);
            padding: 12px;
            min-height: 80px;
        }

        .time-label {
            background: var(--bg-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .class-slot {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--primary-color);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 4px;
        }
        
        .class-slot-title {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="nav-actions">
                    <button class="btn-icon" id="menuToggle" style="display: none;"><i class="fas fa-bars"></i></button>
                    <h2 style="font-size: 1.25rem;">My Timetable</h2>
                </div>
                <div class="nav-actions">
                    <button id="themeToggleBtn" class="btn-icon"><i class="fas fa-moon"></i></button>
                    <div style="position: relative; display: inline-block; cursor: pointer;" onclick="window.location.href='student-notifications.html'">
                        <button class="btn-icon"><i class="fas fa-bell"></i></button>
                        <span id="navUnreadBadge" style="display:none; position: absolute; top: 0; right: 0; background: var(--danger-color); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; font-weight: bold; align-items: center; justify-content: center;"></span>
                    </div>
                    <button id="logoutBtn" class="btn-icon" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="page-content">
                <div class="card" style="margin-bottom: 24px; padding: 16px;">
                    <div style="display: flex; align-items: center; gap: 12px; color: var(--text-secondary);">
                        <i class="fas fa-info-circle"></i>
                        <span id="profileStatus">Loading profile data...</span>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('daily')">Today's Classes</button>
                    <button class="tab-btn" onclick="switchTab('weekly')">Weekly Schedule</button>
                    <button class="tab-btn" onclick="switchTab('exams')">Exam Schedule</button>
                </div>

                <!-- Daily View -->
                <div id="tab-daily" class="tab-pane active">
                    <h3 id="dailyDayTitle" style="margin-top: 0;">Today</h3>
                    <div id="dailyContainer">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Weekly View -->
                <div id="tab-weekly" class="tab-pane">
                    <div style="overflow-x: auto; padding-bottom: 16px;">
                        <div class="weekly-grid" id="weeklyGrid">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Exams View -->
                <div id="tab-exams" class="tab-pane">
                    <div id="examsContainer">
                        <!-- Populated by JS -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/theme.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/student-timetable.js?v=2"></script>
    <script src="js/sidebar.js?v=2"></script>
    <script src="js/router.js?v=2"></script>
</body>
</html>
