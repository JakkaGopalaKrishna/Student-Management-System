<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management - Campus Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .filter-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: flex-end;
            background: var(--bg-color);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .filter-item {
            flex: 1;
            min-width: 150px;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .status-present { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
        .status-absent { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
        .status-late { background: rgba(245, 158, 11, 0.1); color: var(--warning-color); }
        
        .radio-group {
            display: flex;
            gap: 12px;
        }
        .radio-btn {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .radio-btn input {
            display: none;
        }
        .radio-btn span {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 0.875rem;
            transition: all 0.2s;
            font-weight: 500;
        }
        .radio-btn input[value="Present"]:checked + span {
            background: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }
        .radio-btn input[value="Absent"]:checked + span {
            background: var(--danger-color);
            border-color: var(--danger-color);
            color: white;
        }
        .radio-btn input[value="Late"]:checked + span {
            background: var(--warning-color);
            border-color: var(--warning-color);
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap logo-icon"></i>
                    <span>CampusConnect</span>
                </div>
            </div>
            <nav class="nav-menu">
                <div class="nav-item" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item admin-only" onclick="window.location.href='students.html'">
                    <i class="fas fa-user-graduate"></i>
                    <span>Students</span>
                </div>
                <div class="nav-item active admin-only">
                    <i class="fas fa-calendar-check"></i>
                    <span>Attendance</span>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="nav-actions">
                    <button class="btn-icon" id="menuToggle" style="display: none;"><i class="fas fa-bars"></i></button>
                    <h2 style="font-size: 1.25rem;">Attendance Management</h2>
                </div>
                <div class="nav-actions">
                    <button id="themeToggleBtn" class="btn-icon"><i class="fas fa-moon"></i></button>
                    <button id="logoutBtn" class="btn-icon" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <h3 style="margin-bottom: 24px;">Mark Attendance</h3>
                    
                    <div class="filter-bar">
                        <div class="filter-item">
                            <label class="form-label">Date</label>
                            <input type="date" id="dateSelect" class="form-control" required>
                        </div>
                        <div class="filter-item">
                            <label class="form-label">Subject</label>
                            <input type="text" id="subjectSelect" class="form-control" placeholder="e.g. Mathematics" required>
                        </div>
                        <div class="filter-item">
                            <label class="form-label">Branch Filter</label>
                            <select id="branchFilter" class="form-control">
                                <option value="">All Branches</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Electrical Engineering">Electrical Engineering</option>
                                <option value="Mechanical Engineering">Mechanical Engineering</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label class="form-label">Semester Filter</label>
                            <select id="semesterFilter" class="form-control">
                                <option value="">All Semesters</option>
                                <option value="1st">1st Semester</option>
                                <option value="3rd">3rd Semester</option>
                                <option value="5th">5th Semester</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="loadStudentsBtn" style="height: 42px;">
                            <i class="fas fa-search"></i> Load Class
                        </button>
                    </div>

                    <div id="attendanceContainer" style="display: none;">
                        <div style="overflow-x: auto;">
                            <table class="data-table" id="attendanceTable">
                                <thead>
                                    <tr>
                                        <th>Roll Number</th>
                                        <th>Name</th>
                                        <th>Status</th>
                                        <th>Remarks</th>
                                    </tr>
                                </thead>
                                <tbody id="attendanceTableBody">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                        
                        <div style="display: flex; justify-content: flex-end; margin-top: 24px;">
                            <button class="btn btn-primary" id="submitAttendanceBtn">
                                <i class="fas fa-save"></i> Save Attendance
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 24px;">
                    <h3 style="margin-bottom: 24px;">Recent Attendance Records</h3>
                    <div class="filter-bar">
                        <div class="filter-item">
                            <label class="form-label">Search Date</label>
                            <input type="date" id="searchDate" class="form-control">
                        </div>
                        <div class="filter-item">
                            <label class="form-label">Search Subject</label>
                            <input type="text" id="searchSubject" class="form-control" placeholder="Subject">
                        </div>
                        <button class="btn btn-primary" id="searchRecordsBtn" style="height: 42px;">
                            Search
                        </button>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Subject</th>
                                    <th>Student ID</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/attendance.js"></script>
</body>
</html>
