<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Campus Connect</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .form-panel {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .form-panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-links {
            display: flex;
            justify-content: center;
            margin-top: 16px;
            font-size: 0.875rem;
        }
        .auth-links a {
            cursor: pointer;
        }
        .login-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }
        .login-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .login-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div style="font-size: 3rem; color: var(--primary-color);">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>Campus Connect</h1>
                <p style="color: var(--text-secondary); margin-top: 8px;">Smart Student Management System</p>
            </div>
            
            <div id="globalMessage" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.875rem;"></div>

            <!-- LOGIN FORM -->
            <div id="loginPanel" class="form-panel active">
                
                <div class="login-tabs">
                    <div class="login-tab active" data-role="student" onclick="selectRole('student')">
                        <i class="fas fa-user-graduate" style="margin-right: 6px;"></i> Student
                    </div>
                    <div class="login-tab" data-role="teacher" onclick="selectRole('teacher')">
                        <i class="fas fa-chalkboard-teacher" style="margin-right: 6px;"></i> Teacher
                    </div>
                </div>

                <form id="loginForm">
                    <input type="hidden" id="loginRole" value="student">
                    <div class="form-group">
                        <label class="form-label" for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">
                        Sign In
                    </button>
                    <div class="auth-links">
                        <a onclick="switchPanel('forgotPanel')">Forgot Password?</a>
                    </div>
                </form>
            </div>

            <!-- FORGOT PASSWORD FORM -->
            <div id="forgotPanel" class="form-panel">
                <h3 style="margin-bottom: 16px; text-align: center;">Reset Password</h3>
                <p style="color: var(--text-secondary); font-size: 0.875rem; text-align: center; margin-bottom: 16px;">
                    Enter your email and role. We'll send you a reset link.
                </p>
                <form id="forgotForm">
                    <div class="form-group">
                        <label class="form-label" for="forgotRole">I am a:</label>
                        <select id="forgotRole" class="form-control" required>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="forgotEmail">Email Address</label>
                        <input type="email" id="forgotEmail" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">
                        Send Reset Link
                    </button>
                    <div class="auth-links" style="justify-content: center;">
                        <span style="color: var(--text-secondary);">Remember your password? <a onclick="switchPanel('loginPanel')">Sign In</a></span>
                    </div>
                </form>
            </div>

            <div style="text-align: center; margin-top: 24px;">
                <button id="themeToggleBtn" class="btn btn-icon" style="position: absolute; top: 20px; right: 20px;">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/theme.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
    <script src="js/router.js?v=2"></script>
</body>
</html>
