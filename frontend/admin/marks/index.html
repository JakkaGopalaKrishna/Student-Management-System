<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks Management - Campus Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/components.css">
    <style>
        .filter-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: flex-end;
            background: var(--bg-color);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .filter-item {
            flex: 1;
            min-width: 150px;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            width: 100%;
            max-width: 500px;
            background: var(--bg-color);
            border-radius: 12px;
            padding: 24px;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: none;
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .action-btns button {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-edit { background: var(--warning-color); }
        .btn-delete { background: var(--danger-color); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="nav-actions">
                    <button class="btn-icon" id="menuToggle" style="display: none;"><i class="fas fa-bars"></i></button>
                    <h2 style="font-size: 1.25rem;">Marks Management</h2>
                </div>
                <div class="nav-actions">
                    <button id="themeToggleBtn" class="btn-icon"><i class="fas fa-moon"></i></button>
                    <button id="logoutBtn" class="btn-icon" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h3 style="margin: 0;">Marks Directory</h3>
                        <button class="btn btn-primary" id="openAddModalBtn">
                            <i class="fas fa-plus"></i> Add Marks
                        </button>
                    </div>

                    <div class="filter-bar">
                        <div class="filter-item">
                            <label class="form-label">Search Subject</label>
                            <input type="text" id="searchSubject" class="form-control" placeholder="e.g. Mathematics">
                        </div>
                        <div class="filter-item">
                            <label class="form-label">Semester</label>
                            <select id="searchSemester" class="form-control">
                                <option value="">All Semesters</option>
                                <option value="1st">1st Semester</option>
                                <option value="2nd">2nd Semester</option>
                                <option value="3rd">3rd Semester</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label class="form-label">Exam Type</label>
                            <select id="searchExamType" class="form-control">
                                <option value="">All Types</option>
                                <option value="Internal">Internal</option>
                                <option value="External">External</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="searchBtn" style="height: 42px;">
                            Search
                        </button>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Student ID</th>
                                    <th>Subject</th>
                                    <th>Semester</th>
                                    <th>Type</th>
                                    <th>Marks</th>
                                    <th>Max</th>
                                    <th>%</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="marksTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="markModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <h3 id="modalTitle" style="margin-bottom: 24px;">Add Marks</h3>
            
            <form id="markForm">
                <input type="hidden" id="markId">
                
                <div class="form-group" id="studentSelectGroup">
                    <label class="form-label">Select Student</label>
                    <select id="markStudentId" class="form-control" required>
                        <option value="">Loading students...</option>
                    </select>
                </div>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Subject</label>
                        <input type="text" id="markSubject" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Semester</label>
                        <select id="markSemester" class="form-control" required>
                            <option value="">Select Semester</option>
                            <option value="1st">1st Semester</option>
                            <option value="2nd">2nd Semester</option>
                            <option value="3rd">3rd Semester</option>
                            <option value="4th">4th Semester</option>
                            <option value="5th">5th Semester</option>
                            <option value="6th">6th Semester</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Exam Type</label>
                    <select id="markExamType" class="form-control" required>
                        <option value="Internal">Internal (Mid-terms, Assignments)</option>
                        <option value="External">External (Finals)</option>
                    </select>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Marks Obtained</label>
                        <input type="number" id="markObtained" class="form-control" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Marks</label>
                        <input type="number" id="markMax" class="form-control" step="0.1" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Remarks (Optional)</label>
                    <input type="text" id="markRemarks" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Save Marks</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../js/theme.js?v=2"></script>
    <script src="../../js/api.js?v=2"></script>
    <script src="../../js/marks.js?v=2"></script>
    <script src="../../js/sidebar.js?v=2"></script>
    <script src="../../js/router.js?v=2"></script>
</body>
</html>
