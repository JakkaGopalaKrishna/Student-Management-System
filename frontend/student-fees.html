<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fees - Campus Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .stat-box {
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
        }
        .stat-box h4 { color: var(--text-secondary); margin-bottom: 8px; font-size: 0.875rem; text-transform: uppercase; }
        .stat-box p { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .status-paid { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
        .status-partial { background: rgba(59, 130, 246, 0.1); color: var(--info-color); }
        .status-pending { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap logo-icon"></i>
                    <span>CampusConnect</span>
                </div>
            </div>
            <nav class="nav-menu">
                <div class="nav-item" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" onclick="window.location.href='student-attendance.html'">
                    <i class="fas fa-calendar-check"></i>
                    <span>My Attendance</span>
                </div>
                <div class="nav-item" onclick="window.location.href='student-marks.html'">
                    <i class="fas fa-graduation-cap"></i>
                    <span>My Marks</span>
                </div>
                <div class="nav-item active">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Fee Details</span>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="nav-actions">
                    <button class="btn-icon" id="menuToggle" style="display: none;"><i class="fas fa-bars"></i></button>
                    <h2 style="font-size: 1.25rem;">My Fees</h2>
                </div>
                <div class="nav-actions">
                    <button id="themeToggleBtn" class="btn-icon"><i class="fas fa-moon"></i></button>
                    <button id="logoutBtn" class="btn-icon" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="page-content">
                
                <!-- Overall Stats -->
                <div class="dashboard-grid" style="margin-bottom: 24px;">
                    <div class="stat-box" style="border-color: rgba(16, 185, 129, 0.3);">
                        <h4 style="color: var(--success-color);">Total Paid</h4>
                        <p id="totalPaidAmount">$0.00</p>
                    </div>
                    <div class="stat-box" style="border-color: rgba(239, 68, 68, 0.3);">
                        <h4 style="color: var(--danger-color);">Pending Balance</h4>
                        <p id="totalPendingAmount">$0.00</p>
                    </div>
                    <div class="stat-box">
                        <h4>Total Fees Demanded</h4>
                        <p id="totalDemandedAmount">$0.00</p>
                    </div>
                </div>

                <!-- Tables -->
                <div class="card" style="margin-bottom: 24px;">
                    <h3 style="margin-bottom: 16px;">Fee Demands</h3>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Total Amount</th>
                                    <th>Paid Amount</th>
                                    <th>Balance</th>
                                    <th>Due Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="feeDemandsTable">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 16px;">Payment History</h3>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Amount Paid</th>
                                    <th>Method</th>
                                    <th>Reference ID</th>
                                    <th>Receipt</th>
                                </tr>
                            </thead>
                            <tbody id="paymentsTable">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/student-fees.js"></script>
</body>
</html>
