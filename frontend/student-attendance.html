<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance - Campus Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background-color: var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            background-color: var(--success-color);
            transition: width 0.5s ease-in-out;
        }
        .progress-bar-fill.warning { background-color: var(--warning-color); }
        .progress-bar-fill.danger { background-color: var(--danger-color); }
        
        .stat-box {
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
        }
        .stat-box h4 { color: var(--text-secondary); margin-bottom: 8px; font-size: 0.875rem; text-transform: uppercase; }
        .stat-box p { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="nav-actions">
                    <button class="btn-icon" id="menuToggle" style="display: none;"><i class="fas fa-bars"></i></button>
                    <h2 style="font-size: 1.25rem;">My Attendance</h2>
                </div>
                <div class="nav-actions">
                    <button id="themeToggleBtn" class="btn-icon"><i class="fas fa-moon"></i></button>
                    <button id="logoutBtn" class="btn-icon" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="page-content">
                
                <!-- Overall Stats -->
                <div class="dashboard-grid">
                    <div class="card" style="grid-column: 1 / -1;">
                        <h3 style="margin-bottom: 24px;">Overall Attendance</h3>
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                            <span style="font-weight: 600; font-size: 1.25rem;" id="overallPercentage">0%</span>
                            <span style="color: var(--text-secondary);" id="overallClasses">0 / 0 Classes Attended</span>
                        </div>
                        <div class="progress-bar-container" style="height: 20px;">
                            <div class="progress-bar-fill" id="overallProgressBar" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="stat-box">
                        <h4>Total Classes</h4>
                        <p id="totalClasses">0</p>
                    </div>
                    <div class="stat-box" style="border-color: rgba(16, 185, 129, 0.3);">
                        <h4 style="color: var(--success-color);">Present</h4>
                        <p id="totalPresent">0</p>
                    </div>
                    <div class="stat-box" style="border-color: rgba(239, 68, 68, 0.3);">
                        <h4 style="color: var(--danger-color);">Absent</h4>
                        <p id="totalAbsent">0</p>
                    </div>
                    <div class="stat-box" style="border-color: rgba(245, 158, 11, 0.3);">
                        <h4 style="color: var(--warning-color);">Late</h4>
                        <p id="totalLate">0</p>
                    </div>
                </div>

                <div class="dashboard-columns">
                    <!-- Subject-wise Attendance -->
                    <div class="card">
                        <h3 style="margin-bottom: 24px;">Subject-wise Attendance</h3>
                        <div id="subjectStatsContainer">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Monthly Attendance -->
                    <div class="card">
                        <h3 style="margin-bottom: 24px;">Monthly Breakdown</h3>
                        <div id="monthlyStatsContainer">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/student-attendance.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
